# GitHub Actions workflow to run the long-running live OSRM installation and integration tests.
# This test downloads, installs, and runs basic routing for all supported OSRM versions.
# It is run on a schedule to avoid slowing down pull request checks.

name: OSRM Live Integration Tests

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  schedule:
    # Runs at 00:00 UTC on Saturday.
    # This corresponds to 1:00 AM in Berlin (CET, UTC+1) during standard time,
    # and 2:00 AM (CEST, UTC+2) during daylight saving time.
    - cron: '0 0 * * 6'


jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RUN_OSRM_LIVE_TESTS: "true"
      NOT_CRAN: "true"
      PKG_PREFER_BINARIES: true
      OSRM_TEST_RESULTS_FILE: ${{ github.workspace }}/test_results.rds

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::tibble, any::pkgload
          needs: check

      - name: Initialize Test Results
        shell: Rscript {0}
        run: |
          if (file.exists("tools/init_test_results.R")) {
            source("tools/init_test_results.R")
          } else {
            cat("tools/init_test_results.R not found. Skipping.\n")
          }

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
          args: 'c("--no-manual", "--as-cran")'

      - name: Generate Badge JSON
        if: always()
        shell: Rscript {0}
        run: |
          os_name <- "${{ matrix.config.os }}"
          label <- if (grepl("ubuntu", os_name)) "OSRM (Linux)" else if (grepl("macos", os_name)) "OSRM (macOS)" else "OSRM (Windows)"
          fname <- if (grepl("ubuntu", os_name)) "osrm_versions_ubuntu.json" else if (grepl("macos", os_name)) "osrm_versions_macos.json" else "osrm_versions_windows.json"
          
          if (file.exists("tools/generate_badge.R")) {
            # Pass label and filename as args
            system2("Rscript", c("tools/generate_badge.R", shQuote(label), fname))
          } else {
            cat("tools/generate_badge.R not found. Skipping.\n")
          }

      - name: Upload Badge Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: badge-${{ matrix.config.os }}
          path: osrm_versions_*.json

  Deploy-Badges:
    needs: R-CMD-check
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all badge artifacts
        uses: actions/download-artifact@v4
        with:
          path: badges-tmp
          pattern: badge-*
          merge-multiple: true

      - name: Deploy Badges
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Try to switch to existing badges branch, or create new orphan one
          if git fetch origin badges; then
            git checkout badges
            git pull origin badges
          else
            git checkout --orphan badges
            git rm -rf .
          fi
          
          # Restore all JSON files from the artifacts
          if ls badges-tmp/osrm_versions_*.json 1> /dev/null 2>&1; then
            cp badges-tmp/osrm_versions_*.json .
            cat osrm_versions_*.json
            git add --force osrm_versions_*.json
            git commit -m "Update per-OS OSRM versions badges" || echo "No changes to commit"
            git push origin badges --force
          else
            echo "No badge JSON files found in artifacts, skipping deploy."
            exit 1
          fi
