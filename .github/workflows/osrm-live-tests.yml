# GitHub Actions workflow to run the long-running live OSRM installation and integration tests.
# This test downloads, installs, and runs basic routing for all supported OSRM versions.
# It is run on a schedule to avoid slowing down pull request checks.

name: OSRM Live Integration Tests

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  schedule:
    # Runs at 00:00 UTC on Saturday.
    # This corresponds to 1:00 AM in Berlin (CET, UTC+1) during standard time,
    # and 2:00 AM (CEST, UTC+2) during daylight saving time.
    - cron: '0 0 * * 6'


jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RUN_OSRM_LIVE_TESTS: "true"
      NOT_CRAN: "true"
      PKG_PREFER_BINARIES: true

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          install-ghostscript: false

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::tibble
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
          args: 'c("--no-manual", "--as-cran")'
