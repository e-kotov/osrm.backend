# GitHub Actions workflow to run the long-running live OSRM installation and integration tests.
# This test downloads, installs, and runs basic routing for all supported OSRM versions.
# It is run on a schedule to avoid slowing down pull request checks.

name: OSRM Live Integration Tests

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  schedule:
    # Runs at 00:00 UTC on Saturday.
    # This corresponds to 1:00 AM in Berlin (CET, UTC+1) during standard time,
    # and 2:00 AM (CEST, UTC+2) during daylight saving time.
    - cron: '0 0 * * 6'


jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RUN_OSRM_LIVE_TESTS: "true"
      NOT_CRAN: "true"
      PKG_PREFER_BINARIES: true
      OSRM_TEST_RESULTS_FILE: ${{ github.workspace }}/test_results.rds

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true
          install-ghostscript: false

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::tibble, any::pkgload
          needs: check

      - name: Initialize Test Results
        if: matrix.config.os == 'ubuntu-latest'
        shell: Rscript {0}
        run: |
          if (file.exists("tools/init_test_results.R")) {
            source("tools/init_test_results.R")
          } else {
            cat("tools/init_test_results.R not found. Skipping.\n")
          }

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual")'
          args: 'c("--no-manual", "--as-cran")'

      - name: Generate Badge JSON
        if: always() && matrix.config.os == 'ubuntu-latest'
        shell: Rscript {0}
        run: |
          if (file.exists("tools/generate_badge.R")) {
            source("tools/generate_badge.R")
          } else {
            cat("tools/generate_badge.R not found. Skipping.\n")
          }

      - name: Deploy Badge
        if: always() && matrix.config.os == 'ubuntu-latest'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Try to switch to existing badges branch, or create new orphan one
          if git fetch origin badges; then
            git checkout badges
            git pull origin badges
          else
            git checkout --orphan badges
            git rm -rf .
          fi
          
          # The JSON was saved to workspace by the previous step
          if [ -f "osrm_versions.json" ]; then
            git add osrm_versions.json
            git commit -m "Update passing OSRM versions badge" || echo "No changes to commit"
            git push origin badges --force
          else
            echo "osrm_versions.json not found, skipping badge deploy."
            exit 1
          fi
