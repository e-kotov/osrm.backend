name: Debug Windows Binary
on: workflow_dispatch
jobs:
  debug:
    runs-on: windows-latest
    steps:
      - name: Download Windows Binary
        run: |
          Invoke-WebRequest -Uri "https://github.com/e-kotov/osrm-binaries/releases/download/v26.7.2/osrm-v26.7.2-win32-x64-Release.tar.gz" -OutFile "osrm.tar.gz"
          tar -xzf osrm.tar.gz
          cd osrm-v26.7.2-win32-x64-Release
          # Set up MSYS2 to use objdump
          C:\msys64\usr\bin\bash -lc "cd /c/a/osrm.backend/osrm.backend/osrm-v26.7.2-win32-x64-Release && objdump -p osrm-extract.exe > objdump.txt"
          ./osrm-extract.exe --help || echo "Failed with exit code $LASTEXITCODE"
      - name: Upload imports
        uses: actions/upload-artifact@v4
        with:
          name: imports
          path: osrm-v26.7.2-win32-x64-Release/objdump.txt
