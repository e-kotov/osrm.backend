name: Debug Windows Binary
on: workflow_dispatch
jobs:
  debug:
    runs-on: windows-latest
    steps:
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Download Windows Binary
        continue-on-error: true
        run: |
          Invoke-WebRequest -Uri "https://github.com/e-kotov/osrm-binaries/releases/download/v26.7.2/osrm-v26.7.2-win32-x64-Release.tar.gz" -OutFile "osrm.tar.gz"
          tar -xzf osrm.tar.gz
          cd osrm-v26.7.2-win32-x64-Release
          ./osrm-extract.exe --help
      - name: Check Event Log
        if: always()
        shell: powershell
        run: |
          Get-EventLog -LogName Application -Newest 50 | Where-Object { $_.Message -match "osrm-extract" } | Select-Object -Property TimeGenerated, EntryType, Message | Format-List
