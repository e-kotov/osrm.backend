name: Render Vignette After Live Tests

on:
  workflow_run:
    workflows: ["OSRM Live Integration Tests"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-and-commit:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.9.38'

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::knitr, any::rmarkdown, any::pkgload, any::jsonlite, any::pkgdown, any::quarto, local::.
          needs: website

      - name: Generate tested releases table
        run: Rscript tools/generate_tested_table.R

      - name: Render binary providers vignette
        run: |
          mkdir -p docs/articles
          quarto render vignettes/binary-providers.qmd --to html --output-dir ../docs/articles

      - name: Commit rendered vignette
        env:
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          git config user.name "$GIT_COMMITTER_NAME"
          git config user.email "$GIT_COMMITTER_EMAIL"
          if git add -f docs/articles/binary-providers.html && git add -f vignettes/generated-tested-versions.md README.md && ! git diff --staged --quiet; then
            git commit -m "ci: update rendered binary-providers vignette and tested releases table after live tests"
            git push origin HEAD:main
          else
            echo "No changes to commit."
          fi

      - name: Build pkgdown site
        run: |
          pkgdown::clean_site(force = TRUE)
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
